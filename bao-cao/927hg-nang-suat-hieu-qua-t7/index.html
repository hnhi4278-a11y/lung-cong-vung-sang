function tr(v){ return (v/1e6).toFixed(1).replace('.', ',') + 'tr'; }
function money(v){ return Math.round(v).toLocaleString('vi-VN').replace(/,/g,'.'); }
function pct(v){ const s = v>=0?'+':''; return s + v.toFixed(1).replace('.', ',') + '%'; }
function clsFor(v){ if (v===null||v===undefined) return ''; v = Math.round(v*10)/10; if (v>=3) return 'up'; if (v<=-3) return 'down'; return 'flat'; }
function combo(v6, v7, chg, fmt){
  fmt = fmt || tr;
  if (v6===null||v6===undefined||v7===null||v7===undefined) return '<span class="dash">—</span>';
  if (v6===0 && v7===0) return '<span class="dash">—</span>';
  if (v6===0 && v7>0) return fmt(v6) + ' → ' + fmt(v7) + ' <span class="pill up">Mới</span>';
  if (v6>0 && v7===0) return fmt(v6) + ' → ' + fmt(v7) + ' <span class="pill down">Mất</span>';
  const c = clsFor(chg);
  let extra = '';
  if (c === 'down'){
    const delta = v7 - v6;
    extra = ' <span class="delta">(' + fmt(Math.abs(delta)) + ')</span>';
  }
  return fmt(v6) + ' → ' + fmt(v7) + ' <span class="pill ' + c + '">' + pct(chg) + '</span>' + extra;
}
function sumRange(dayMap, s, e){
  let total = 0;
  for (const d in dayMap){ if (d >= s && d <= e) total += (dayMap[d].dt !== undefined ? dayMap[d].dt : dayMap[d]); }
  return total;
}
function sumField(dayMap, s, e, field){
  let total = 0;
  for (const d in dayMap){ if (d >= s && d <= e) total += (dayMap[d][field] || 0); }
  return total;
}
function sumKhach(dayMap, s, e){
  let total = 0;
  for (const d in dayMap){ if (d >= s && d <= e) total += (dayMap[d].kh || 0); }
  return total;
}
function sumSalon(field, s, e){
  let total = 0;
  for (const d in DATA.salon){ if (d >= s && d <= e) total += (DATA.salon[d][field] || 0); }
  return total;
}

function render(p1s, p1e, p2s, p2e){
  document.getElementById('subLabel').textContent =
    p1s + ' → ' + p1e + ' (kỳ trước)  →  ' + p2s + ' → ' + p2e + ' (kỳ hiện tại)';

  // Salon cards
  const salonItems = [
    ['Tổng DT salon', 'tong', false], ['UDN', 'udn', false], ['SP', 'sp', false],
    ['Topup', 'topup', false], ['Lượt khách', 'khach', true],
  ];
  let salonHtml = '';
  for (const [label, key, isCount] of salonItems){
    const v6 = sumSalon(key, p1s, p1e), v7 = sumSalon(key, p2s, p2e);
    const chg = v6 ? (v7-v6)/v6*100 : 0;
    const c = clsFor(chg);
    const fmtSalon = isCount ? (v=>Math.round(v).toLocaleString('vi-VN').replace(/,/g,'.')+' khách') : tr;
    const disp = isCount ? Math.round(v7).toLocaleString('vi-VN').replace(/,/g,'.') : tr(v7);
    let deltaHtml = '';
    if (c === 'down'){
      deltaHtml = ' <span class="delta">('+fmtSalon(Math.abs(v7-v6))+')</span>';
    }
    salonHtml += '<div class="card"><div class="label">'+label+'</div><div class="value">'+disp+'</div>' +
      '<div class="muted"><span class="pill '+c+'">'+pct(chg)+'</span> so kỳ trước'+deltaHtml+'</div></div>';
  }
  document.getElementById('salonCards').innerHTML = salonHtml;

  // Per-person rows
  const rows = [];
  for (const sid in DATA.staff){
    const s = DATA.staff[sid];
    const dt6 = sumRange(s.days, p1s, p1e), dt7 = sumRange(s.days, p2s, p2e);
    if (dt6<=0 || dt7<=0) continue;
    const kh6 = sumKhach(s.days, p1s, p1e), kh7 = sumKhach(s.days, p2s, p2e);
    const aov6 = kh6 ? dt6/kh6 : 0, aov7 = kh7 ? dt7/kh7 : 0;
    const chgDt = (dt7-dt6)/dt6*100;
    const chgAov = aov6 ? (aov7-aov6)/aov6*100 : 0;
    const chgKh = kh6 ? (kh7-kh6)/kh6*100 : 0;
    const sp6 = sumRangeSimple(s.sp, p1s, p1e);
    const sp7 = sumRangeSimple(s.sp, p2s, p2e);
    const chgSp = sp6 ? (sp7-sp6)/sp6*100 : null;
    let extra6=null, extra7=null, extraLabel='';
    if (s.group === 'Stylist'){ extra6 = sumRangeSimple(s.udn, p1s, p1e); extra7 = sumRangeSimple(s.udn, p2s, p2e); extraLabel = 'UDN'; }
    else { extra6 = sumRangeSimple(s.topup, p1s, p1e); extra7 = sumRangeSimple(s.topup, p2s, p2e); extraLabel = 'Topup'; }
    const chgExtra = extra6 ? (extra7-extra6)/extra6*100 : null;
    rows.push({ group: s.group, name: s.name, dt6, dt7, chgDt, kh6, kh7, chgKh, aov6, aov7, chgAov,
      sp6, sp7, chgSp, extra6, extra7, chgExtra, extraLabel });
  }

  const groups = { Stylist: [], Skinner: [], Sup: [] };
  for (const r of rows) groups[r.group].push(r);
  for (const g in groups) groups[g].sort((a,b) => a.chgDt - b.chgDt);

  // Group summary cards
  let groupHtml = '';
  for (const g of ['Stylist','Skinner','Sup']){
    const vals = groups[g].map(r => r.chgDt);
    if (!vals.length) continue;
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    const up = vals.filter(v=>v>=3).length, down = vals.filter(v=>v<=-3).length, flat = vals.length-up-down;
    const c = avg>=0 ? 'up' : 'down';
    groupHtml += '<div class="card"><div class="label">'+g+'</div><div class="value '+c+'">'+pct(avg)+'</div>' +
      '<div class="muted">'+vals.length+' người · Tăng '+up+' / Giảm '+down+' / Đi ngang '+flat+'</div></div>';
  }
  document.getElementById('groupCards').innerHTML = groupHtml;

  // Person cards per group
  let tablesHtml = '';
  for (const g of ['Stylist','Skinner','Sup']){
    if (!groups[g].length) continue;
    let cardsHtml = '';
    for (const r of groups[g]){
      cardsHtml += '<div class="person"><div class="person-name">'+r.name+'</div><div class="metrics">' +
        '<div class="metric"><span class="mlabel">Doanh thu</span>'+combo(r.dt6, r.dt7, r.chgDt)+'</div>' +
        '<div class="metric"><span class="mlabel">Khách</span>'+combo(r.kh6, r.kh7, r.chgKh, v=>Math.round(v)+' khách')+'</div>' +
        '<div class="metric"><span class="mlabel">AOV</span>'+combo(r.aov6, r.aov7, r.chgAov, money)+'</div>' +
        '<div class="metric"><span class="mlabel">'+(r.extraLabel||'Chỉ tiêu riêng')+'</span>'+combo(r.extra6, r.extra7, r.chgExtra)+'</div>' +
        '<div class="metric"><span class="mlabel">SP</span>'+combo(r.sp6, r.sp7, r.chgSp)+'</div>' +
        '</div></div>';
    }
    tablesHtml += '<section><h2>'+g+'</h2><div class="person-list">'+cardsHtml+'</div></section>';
  }
  document.getElementById('tables').innerHTML = tablesHtml;
}

function sumRangeSimple(dayMap, s, e){
  let total = 0;
  for (const d in dayMap){ if (d >= s && d <= e) total += dayMap[d]; }
  return total;
}

document.getElementById('applyBtn').addEventListener('click', function(){
  render(
    document.getElementById('p1s').value, document.getElementById('p1e').value,
    document.getElementById('p2s').value, document.getElementById('p2e').value
  );
});

document.getElementById('p1s').value = DATA.defaults.p1s;
document.getElementById('p1e').value = DATA.defaults.p1e;

document.getElementById('p1s').min = DATA.range[0]; document.getElementById('p1s').max = DATA.range[1];
document.getElementById('p1e').min = DATA.range[0]; document.getElementById('p1e').max = DATA.range[1];
document.getElementById('p2s').min = DATA.range[0]; document.getElementById('p2s').max = DATA.range[1];
document.getElementById('p2e').min = DATA.range[0]; document.getElementById('p2e').max = DATA.range[1];
render(DATA.defaults.p1s, DATA.defaults.p1e, DATA.defaults.p2s, DATA.defaults.p2e);
